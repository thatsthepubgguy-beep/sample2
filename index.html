    .pr-lbl { color:var(--text-muted); flex-shrink:0; }
    .pr-right { display:flex; align-items:center; gap:8px; }
    .pr-val { font-weight:600; color:var(--text-primary); word-break:break-all; }
    .copy-btn {
      display:inline-flex; align-items:center; gap:4px;
      background:var(--accent-dim); border:1px solid rgba(139,26,46,0.22);
      border-radius:8px; padding:4px 10px; font-size:0.63rem; font-weight:700;
      color:var(--accent-bright); cursor:pointer; transition:all 0.3s; white-space:nowrap; flex-shrink:0;
      font-family:'Inter',sans-serif;
    }
    .copy-btn i { font-size:0.85rem; }
    .copy-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
    .copy-btn.done { background:rgba(94,201,138,0.14); color:var(--success); border-color:rgba(94,201,138,0.25); }
    .pay-note { margin:0 16px 28px; padding:14px 16px; background:var(--glass-bg); backdrop-filter:blur(10px); border:1px solid var(--glass-border); border-radius:var(--radius-sm); font-size:0.73rem; color:var(--text-secondary); line-height:1.75; }
    .pay-note i { color:var(--accent-bright); margin-right:5px; vertical-align:-2px; }

    /* ── ABOUT ── */
    .about-img { width:calc(100% - 32px); height:200px; object-fit:cover; display:block; border-radius:0 0 var(--radius-xl) var(--radius-xl); margin:0 16px; }
    .about-body-wrap { padding:0 18px 32px; }
    .about-name { font-family:'Playfair Display',serif; font-size:2rem; color:var(--text-primary); margin-top:22px; }
    .about-tag { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.16em; color:var(--accent-bright); margin-top:6px; }
    .about-txt { font-size:0.86rem; color:var(--text-secondary); line-height:1.92; margin-top:16px; }
    .stats-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:12px; margin:22px 0; }
    .stat-c {
      background:var(--glass-bg); backdrop-filter:blur(15px); -webkit-backdrop-filter:blur(15px);
      border:1px solid var(--glass-border); border-radius:var(--radius-md);
      padding:20px; text-align:center; box-shadow:var(--shadow-sm); transition:all 0.3s;
    }
    .stat-c:hover { border-color:rgba(139,26,46,0.3); transform:translateY(-2px); }
    .stat-n { font-family:'Playfair Display',serif; font-size:2rem; background:linear-gradient(135deg, var(--accent-bright) 0%, #E85070 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .stat-l { font-size:0.62rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.1em; margin-top:5px; }
    .mini-ttl { font-family:'Playfair Display',serif; font-size:1.12rem; margin:18px 0 12px; color:var(--text-primary); }
    .contact { display:flex; align-items:center; gap:14px; padding:12px 0; border-bottom:1px solid var(--glass-border); font-size:0.8rem; color:var(--text-secondary); }
    .contact:last-child { border-bottom:none; }
    .c-icon { width:38px; height:38px; background:var(--accent-dim); border:1px solid rgba(139,26,46,0.18); border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; color:var(--accent-bright); }

    /* ── TOAST ── */
    .toast {
      position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(10px);
      background:rgba(22,13,17,0.92); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      color:var(--success); border:1.5px solid rgba(94,201,138,0.3); border-radius:var(--radius-full);
      padding:10px 24px; font-size:0.78rem; font-weight:600; letter-spacing:0.04em;
      z-index:9999; opacity:0; transition:all 0.3s; pointer-events:none; white-space:nowrap; box-shadow:var(--shadow-lg);
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ── LANG MODAL ── */
    .lang-ov { position:fixed; inset:0; background:rgba(10,6,8,0.65); z-index:900; display:none; align-items:flex-end; justify-content:center; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); }
    .lang-ov.open { display:flex; }
    .lang-sheet {
      background:linear-gradient(135deg, rgba(28,14,18,0.99) 0%, rgba(18,10,13,0.99) 100%);
      backdrop-filter:blur(40px); -webkit-backdrop-filter:blur(40px);
      border-radius:var(--radius-xl) var(--radius-xl) 0 0;
      padding:22px 20px 40px; width:100%; max-width:768px;
      border-top:1px solid var(--glass-border-strong);
      animation:slideUp 0.35s ease; box-shadow:0 -20px 60px rgba(0,0,0,0.6);
    }
    .lang-handle { width:44px; height:4px; background:var(--glass-border-strong); border-radius:2px; margin:0 auto 22px; }
    .lang-ttl { font-family:'Playfair Display',serif; font-size:1.3rem; margin-bottom:18px; color:var(--text-primary); }
    .lang-opt { display:flex; align-items:center; gap:16px; padding:16px 18px; background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:var(--radius-md); margin-bottom:10px; cursor:pointer; transition:all 0.3s; backdrop-filter:blur(10px); }
    .lang-opt:hover, .lang-opt.sel { border-color:var(--accent); background:var(--accent-dim); }
    .lang-flag { font-size:1.55rem; }
    .lang-nm { font-weight:600; font-size:0.9rem; color:var(--text-primary); }
    .lang-nat { font-size:0.7rem; color:var(--text-muted); }
    .lang-chk { margin-left:auto; color:var(--accent-bright); display:none; font-size:1rem; }
    .lang-opt.sel .lang-chk { display:flex; }

    /* ── BOTTOM NAV ── */
    .nav-wrap { padding:12px 20px max(env(safe-area-inset-bottom), 16px); background:transparent; flex-shrink:0; position:sticky; bottom:0; z-index:50; }
    .bottomnav {
      display:flex; align-items:center;
      background:rgba(22,10,14,0.9); backdrop-filter:blur(26px); -webkit-backdrop-filter:blur(26px);
      border:1px solid var(--glass-border-strong); border-radius:var(--radius-full);
      padding:6px 8px; box-shadow:var(--shadow-lg), 0 0 40px rgba(139,26,46,0.1);
    }
    .nav-item {
      display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer;
      padding:10px 0; border-radius:var(--radius-full); color:var(--text-muted);
      font-size:0.58rem; font-weight:600; text-transform:uppercase; letter-spacing:0.08em;
      transition:all 0.3s cubic-bezier(0.4,0,0.2,1); flex:1;
    }
    .nav-item i { font-size:1.3rem; transition:all 0.3s; }
    .nav-item.active {
      background:linear-gradient(135deg, var(--accent) 0%, var(--accent-bright) 100%);
      color:#fff; box-shadow:0 4px 22px rgba(139,26,46,0.45);
    }
    .nav-item:not(.active):hover { color:var(--text-secondary); background:var(--glass-bg-hover); }

    /* ── RESPONSIVE ── */
    @media (min-width:640px) {
      .hero { height:360px; margin:0 24px; margin-top:12px; }
      .hero-title { font-size:2.7rem; }
      .feat-grid { grid-template-columns:repeat(4, 1fr); margin:20px 24px 0; }
      .welcome-card { margin:24px 24px 0; }
      .cta-row { padding:24px; }
      .item-list { padding:0 20px; }
      .stats-grid { grid-template-columns:repeat(4, 1fr); }
    }
    @media (min-width:768px) {
      .hero { height:400px; }
      .hero-title { font-size:3rem; }
      .menu-item { padding:14px; }
      .item-thumb { width:84px; height:84px; }
      .sheet { max-width:600px; border-radius:var(--radius-xl); margin-bottom:24px; }
      .overlay { align-items:center; padding:24px; }
    }

    /* ── SCROLL REVEAL ── */
    .scroll-reveal { opacity:0; transform:translateY(20px); transition:all 0.6s cubic-bezier(0.4,0,0.2,1); }
    .scroll-reveal.visible { opacity:1; transform:none; }

    /* ── REDUCED MOTION ── */
    @media (prefers-reduced-motion:reduce) {
      *, *::before, *::after { animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; }
    }
    @supports not (backdrop-filter:blur(1px)) {
      .glass, .glass-strong { background:rgba(22,10,14,0.92); }
    }

    /* ── LIGHT THEME ── */
    .light {
      --glass-bg: rgba(0,0,0,0.03);
      --glass-bg-hover: rgba(0,0,0,0.055);
      --glass-border: rgba(80,10,20,0.1);
      --glass-border-strong: rgba(80,10,20,0.18);
      --bg-deep: #fdf5f6;
      --bg-mid: #ffffff;
      --accent: #7A1425;
      --accent-light: #9B1B30;
      --accent-bright: #B52240;
      --accent-glow: rgba(122,20,37,0.35);
      --accent-dim: rgba(122,20,37,0.1);
      --text-primary: #1a0a0d;
      --text-secondary: rgba(26,10,13,0.68);
      --text-muted: rgba(26,10,13,0.42);
      --text-disabled: rgba(26,10,13,0.25);
      --shadow-sm: 0 2px 8px rgba(80,10,20,0.08);
      --shadow-md: 0 4px 24px rgba(80,10,20,0.1);
      --shadow-lg: 0 8px 32px rgba(80,10,20,0.12);
    }
    .light .bg-mesh {
      background:
        radial-gradient(ellipse at 15% 15%, rgba(139,26,46,0.05) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 85%, rgba(101,15,30,0.03) 0%, transparent 55%),
        #fdf5f6;
    }
    .light .topbar { background:rgba(253,245,246,0.88); border-bottom:1px solid var(--glass-border); }
    .light .hero-ov { background:linear-gradient(to bottom, transparent 0%, rgba(253,245,246,0.65) 55%, var(--bg-deep) 100%); }
    .light .btn-o { color:var(--text-primary); border-color:var(--glass-border-strong); }
    .light .btn-o:hover { background:var(--glass-bg-hover); border-color:var(--accent); color:var(--accent-bright); }
    .light .icon-btn { color:var(--text-secondary); }
    .light .icon-btn:hover { background:var(--accent-dim); color:var(--accent-bright); }
    .light .lang-btn { color:var(--text-secondary); }
    .light .lang-btn:hover { background:var(--accent-dim); color:var(--accent-bright); }
    .light .search-input { color:var(--text-primary); }
    .light .search-input::placeholder { color:var(--text-muted); }
    .light .cat-tab { color:var(--text-secondary); }
    .light .menu-item:hover { border-color:var(--accent); }
    .light .item-name { color:var(--text-primary); }
    .light .item-desc-s { color:var(--text-muted); }
    .light .sheet { background:linear-gradient(135deg, rgba(255,248,250,0.99) 0%, rgba(253,245,246,0.99) 100%); border-top:1px solid var(--glass-border-strong); }
    .light .sheet-close { color:var(--text-primary); }
    .light .sheet-name { color:var(--text-primary); }
    .light .sheet-desc { color:var(--text-secondary); }
    .light .lang-sheet { background:linear-gradient(135deg, rgba(255,248,250,0.99) 0%, rgba(253,245,246,0.99) 100%); }
    .light .lang-opt { background:var(--glass-bg); }
    .light .lang-opt:hover, .light .lang-opt.sel { background:var(--accent-dim); }
    .light .bottomnav { background:rgba(253,245,246,0.92); box-shadow:var(--shadow-lg), 0 0 40px rgba(122,20,37,0.06); }
    .light .nav-item { color:var(--text-muted); }
    .light .nav-item:not(.active):hover { color:var(--text-secondary); background:var(--glass-bg-hover); }
    .light .welcome-card { background:var(--glass-bg); border:1px solid var(--glass-border); }
    .light .feat-card { background:linear-gradient(135deg, rgba(0,0,0,0.025) 0%, rgba(0,0,0,0.01) 100%); border:1px solid var(--glass-border); }
    .light .feat-card:hover { border-color:rgba(122,20,37,0.25); box-shadow:var(--shadow-md), 0 0 22px rgba(122,20,37,0.08); }
    .light .footer-note { background:var(--glass-bg); border:1px solid var(--glass-border); }
    .light .toast { background:rgba(253,245,246,0.95); border:1.5px solid rgba(94,201,138,0.3); }
    .light .info-box { background:rgba(122,20,37,0.03); }
    .light .pr-val { color:var(--text-primary); }
    .light .about-txt { color:var(--text-secondary); }
    .light .contact { color:var(--text-secondary); }
    .light .overlay { background:rgba(253,245,246,0.7); }
    .light .tag-popular { background:rgba(122,20,37,0.1); color:#9B1B30; border:1px solid rgba(122,20,37,0.2); }
  </style>
  <base target="_blank">
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="bg-noise"></div>

<div id="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <button class="lang-btn" onclick="openLang()" id="lang-pill">
      <i class="ti ti-world" aria-hidden="true"></i>
      <span id="lang-pill-text">EN</span>
    </button>
    <div class="topbar-c">
      <div class="topbar-logo">AK Digital</div>
      <div class="topbar-sub">Digital Menu</div>
    </div>
    <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" title="Toggle theme" aria-label="Toggle light/dark theme">
      <i class="ti ti-sun" id="theme-icon" aria-hidden="true"></i>
    </button>
  </div>

  <div id="content">

    <!-- HOME -->
    <div class="page active fade-in" id="page-home">
      <div class="hero">
        <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=800&q=80" alt="Café interior">
        <div class="hero-ov"></div>
        <div class="hero-body">
          <div class="hero-title" id="ht">Elevate your customers experience, one scan at a time.</div>
          <div class="hero-sub" id="hs">Fine coffee &amp; sweet moments</div>
        </div>
      </div>
      <div class="welcome-card"><div class="welcome-text" id="wt"></div></div>
      <div class="feat-grid">
        <div class="feat-card"><div class="feat-ic"><i class="ti ti-coffee" aria-hidden="true"></i></div><div class="feat-t" id="f1t"></div><div class="feat-d" id="f1d"></div></div>
        <div class="feat-card"><div class="feat-ic"><i class="ti ti-cake" aria-hidden="true"></i></div><div class="feat-t" id="f2t"></div><div class="feat-d" id="f2d"></div></div>
        <div class="feat-card"><div class="feat-ic"><i class="ti ti-glass-full" aria-hidden="true"></i></div><div class="feat-t" id="f3t"></div><div class="feat-d" id="f3d"></div></div>
        <div class="feat-card"><div class="feat-ic"><i class="ti ti-leaf" aria-hidden="true"></i></div><div class="feat-t" id="f4t"></div><div class="feat-d" id="f4d"></div></div>
      </div>
      <div class="cta-row">
        <button class="btn-p" id="cta-m" onclick="navigate('menu')">View Menu</button>
        <button class="btn-o" id="cta-a" onclick="navigate('about')">About Us</button>
      </div>
      <div class="footer-note" id="fn"></div>
    </div>

    <!-- MENU -->
    <div class="page" id="page-menu">
      <div class="search-wrap">
        <i class="ti ti-search search-icon" aria-hidden="true"></i>
        <input class="search-input" id="search-input" type="text" placeholder="Search menu…" oninput="filterMenu()">
      </div>
      <div class="cat-tabs" id="cat-tabs"></div>
      <div id="menu-list"></div>
    </div>

    <!-- PAYMENT -->
    <div class="page" id="page-payment">
      <div class="ph"><h1 id="pt"></h1><p id="ps"></p></div>
      <div class="pay-hero-card">
        <div class="pay-hero-icon"><i class="ti ti-credit-card" aria-hidden="true"></i></div>
        <div class="pay-hero-ttl" id="pay_h"></div>
        <div class="pay-hero-sub" id="pay_hs"></div>
      </div>
      <div class="pay-sec">
        <div class="pay-sec-lbl" id="dig"></div>
        <!-- TeleBirr -->
        <div class="pay-card pay-card-tb">
          <div class="pc-hdr">
            <div><div class="pc-title">TeleBirr</div><div class="pc-sub" id="tb_s"></div></div>
            <span class="pc-badge" id="rec"></span>
          </div>
          <div class="info-box">
            <div class="pay-row">
              <span class="pr-lbl" id="phn"></span>
              <div class="pr-right">
                <span class="pr-val" id="tb-num"></span>
                <button class="copy-btn" onclick="doCopy('tb-num','cpb-tb')" id="cpb-tb">
                  <i class="ti ti-copy" aria-hidden="true"></i>
                  <span id="cpl-tb">Copy</span>
                </button>
              </div>
            </div>
            <div class="pay-row"><span class="pr-lbl" id="an1"></span><div class="pr-right"><span class="pr-val" id="tb-nm"></span></div></div>
          </div>
        </div>
        <!-- CBE -->
        <div class="pay-card pay-card-cbe">
          <div class="pc-hdr"><div><div class="pc-title">CBE Birr / Bank Transfer</div><div class="pc-sub" id="cbe_s"></div></div></div>
          <div class="info-box">
            <div class="pay-row">
              <span class="pr-lbl" id="acc"></span>
              <div class="pr-right">
                <span class="pr-val" id="cbe-acc"></span>
                <button class="copy-btn" onclick="doCopy('cbe-acc','cpb-cbe')" id="cpb-cbe">
                  <i class="ti ti-copy" aria-hidden="true"></i>
                  <span id="cpl-cbe">Copy</span>
                </button>
              </div>
            </div>
            <div class="pay-row"><span class="pr-lbl" id="an2"></span><div class="pr-right"><span class="pr-val" id="cbe-nm"></span></div></div>
            <div class="pay-row"><span class="pr-lbl" id="br"></span><div class="pr-right"><span class="pr-val" id="cbe-br"></span></div></div>
          </div>
        </div>
      </div>
      <div class="pay-sec">
        <div class="pay-sec-lbl" id="cash-ttl"></div>
        <div class="pay-card pay-card-cash">
          <div class="pc-hdr"><div><div class="pc-title" id="cash-card-ttl"></div><div class="pc-sub" id="cash-d"></div></div></div>
        </div>
      </div>
      <div class="pay-note"><i class="ti ti-info-circle" aria-hidden="true"></i><span id="pn"></span></div>
    </div>

    <!-- ABOUT -->
    <div class="page" id="page-about">
      <img class="about-img" src="https://images.unsplash.com/photo-1559925393-8be0ec4767c8?w=800&q=80" alt="Café interior">
      <div class="about-body-wrap">
        <div class="about-name" id="about-nm"></div>
        <div class="about-tag" id="about-as"></div>
        <div class="about-txt" id="about-ab"></div>
        <div class="stats-grid">
          <div class="stat-c"><div class="stat-n">50+</div><div class="stat-l" id="s1"></div></div>
          <div class="stat-c"><div class="stat-n">7</div><div class="stat-l" id="s2"></div></div>
          <div class="stat-c"><div class="stat-n">3</div><div class="stat-l" id="s3"></div></div>
          <div class="stat-c"><div class="stat-n">100%</div><div class="stat-l" id="s4"></div></div>
        </div>
        <div class="mini-ttl" id="fu"></div>
        <div id="contact-list"></div>
      </div>

  </div><!-- /content -->

  <!-- FLOATING PILL NAV -->
  <div class="nav-wrap">
    <nav class="bottomnav">
      <div class="nav-item active" id="nav-home" onclick="navigate('home')">
        <i class="ti ti-home" aria-hidden="true"></i>
        <span id="nav-home-lbl">Home</span>
      </div>
      <div class="nav-item" id="nav-menu" onclick="navigate('menu')">

        <i class="ti ti-info-circle" aria-hidden="true"></i>
        <span id="nav-about-lbl">About</span>
      </div>
    </nav>
  </div>
</div><!-- /app -->

<!-- DETAIL SHEET -->

  <div class="sheet" id="d-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hero">
      <img id="d-img" src="" alt="">

        <i class="ti ti-x" aria-hidden="true"></i>

      <div class="sheet-desc" id="d-desc"></div>
      <div class="sheet-tags" id="d-tags"></div>
    </div>
  </div>
</div>

<!-- LANG MODAL -->
<div class="lang-ov" id="lang-ov" onclick="closeLang(event)">
  <div class="lang-sheet">

    <div class="lang-ttl" id="cl"></div>
    <div class="lang-opt sel" id="lang-en" onclick="setLang('en')">
      <span class="lang-flag">🇺🇸</span>
      <div><div class="lang-nm">English</div><div class="lang-nat">English</div></div>
      <span class="lang-chk"><i class="ti ti-check" aria-hidden="true"></i></span>
    </div>
    <div class="lang-opt" id="lang-am" onclick="setLang('am')">
      <span class="lang-flag">🇪🇹</span>
      <div><div class="lang-nm">Amharic</div><div class="lang-nat">አማርኛ</div></div>
      <span class="lang-chk"><i class="ti ti-check" aria-hidden="true"></i></span>
    </div>
    <div class="lang-opt" id="lang-om" onclick="setLang('om')">
      <span class="lang-flag">🇪🇹</span>
      <div><div class="lang-nm">Afan Oromo</div><div class="lang-nat">Afaan Oromoo</div></div>
      <span class="lang-chk"><i class="ti ti-check" aria-hidden="true"></i></span>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
  /* ── statics ── */
  document.getElementById('about-nm').textContent = RESTAURANT.name;
  document.getElementById('tb-num').textContent  = RESTAURANT.telebirrNumber;
  document.getElementById('tb-nm').textContent   = RESTAURANT.telebirrName;
  document.getElementById('cbe-acc').textContent = RESTAURANT.cbeAccount;
  document.getElementById('cbe-nm').textContent  = RESTAURANT.cbeName;
  document.getElementById('cbe-br').textContent  = RESTAURANT.cbeBranch;

  const CONTACT_ICONS = [
    { key:'address', icon:'ti-map-pin' },
    { key:'phone',   icon:'ti-phone' },
    { key:'email',   icon:'ti-mail' },
    { key:'hours',   icon:'ti-clock' },
    { key:'instagram', icon:'ti-brand-instagram' },
  ];
  const CONTACT_VALS = [
    RESTAURANT.address, RESTAURANT.phone, RESTAURANT.email,
    RESTAURANT.hours, RESTAURANT.instagram
  ];
  document.getElementById('contact-list').innerHTML = CONTACT_ICONS.map((c,i)=>
    `<div class="contact"><div class="c-icon"><i class="ti ${c.icon}" aria-hidden="true"></i></div><span>${CONTACT_VALS[i]}</span></div>`
  ).join('');

  /* ── state ── */
  let lang = 'en', activeCat = 'all', lastIdx = -1, isDark = true;

  /* ── helpers ── */
  const iL = item => item[lang] || item.en;
  const cL = cat  => cat.category[lang] || cat.category.en;
  const tL = tag  => (TAG_LABELS[lang]||TAG_LABELS.en)[tag]||tag;
  const t  = ()   => T[lang]||T.en;

  /* ── copy ── */
  const copyTimers = {};
  function doCopy(valId, btnId) {
    const val = document.getElementById(valId).textContent.trim();
    const tr = t();
    const finish = () => {
      const btn = document.getElementById(btnId);
      const lbl = btn.querySelector('span');
      btn.classList.add('done'); lbl.textContent = tr.cd;
      showToast(tr.cd);
      clearTimeout(copyTimers[btnId]);
      copyTimers[btnId] = setTimeout(()=>{ btn.classList.remove('done'); lbl.textContent = tr.cp; }, 2200);
    };
    navigator.clipboard ? navigator.clipboard.writeText(val).then(finish).catch(finish) : finish();
  }
  let toastT;
  function showToast(msg){
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastT); toastT = setTimeout(()=>el.classList.remove('show'),2400);
  }

  /* ── category tabs ── */
  function buildTabs(){
    const tr = t();
    const w = document.getElementById('cat-tabs');
    w.innerHTML = `<div class="cat-tab active" data-cat="all" onclick="selectCat('all',this)">${tr.all}</div>`;
    MENU.forEach(cat => {
      w.innerHTML += `<div class="cat-tab" data-cat="${cat.categoryKey}" onclick="selectCat('${cat.categoryKey}',this)">${cL(cat)}</div>`;
    });
  }

  /* ── menu list ── */
  function buildMenu(cat='all', q=''){
    const list = document.getElementById('menu-list');
    const tr = t(); const query = q.toLowerCase().trim();
    let html = '', any = false;
    let flatIdx = 0;
    MENU.forEach(section => {
      const rows = [];
      section.items.forEach(item => {
        const idx = flatIdx++;
        if(cat!=='all' && section.categoryKey!==cat) return;
        const loc = iL(item);
        if(!query || loc.name.toLowerCase().includes(query) || loc.desc.toLowerCase().includes(query) || item.en.name.toLowerCase().includes(query))
          rows.push({item, idx});
      });
      if(!rows.length) return;
      any = true;
      html += `<div class="cat-section"><div class="cat-hdr"><div class="cat-hdr-line"></div><div class="cat-hdr-lbl">${cL(section)}</div><div class="cat-hdr-line"></div></div><div class="item-list">`;
      rows.forEach(({item, idx}) => {
        const loc = iL(item);
        const tags = item.tags.map(tg=>`<span class="tag tag-${tg.toLowerCase()}">${tL(tg)}</span>`).join('');
        html += `<div class="menu-item" data-idx="${idx}">
          <div class="item-thumb"><img src="${item.img}" alt="${loc.name}" loading="lazy"></div>
          <div class="item-body">
            <div class="item-name">${loc.name}</div>
            <div class="item-desc-s">${loc.desc}</div>
            ${tags?`<div class="item-tags">${tags}</div>`:''}
          </div>
          <div class="item-right">
            <div class="item-price">ETB ${item.price}</div>
            <i class="ti ti-chevron-right item-arrow" aria-hidden="true"></i>
          </div>
        </div>`;
      });
      html += `</div></div>`;
    });
    if(!any) html = `<div class="empty-state"><div class="ei"><i class="ti ti-search-off" aria-hidden="true"></i></div><div class="et">${tr.empty}</div></div>`;
    list.innerHTML = html;
    list.querySelectorAll('.menu-item').forEach(el => el.addEventListener('click', () => openDetail(+el.dataset.idx)));
  }

  function selectCat(cat, el){
    activeCat = cat;
    document.querySelectorAll('.cat-tab').forEach(e=>e.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('search-input').value = '';
    buildMenu(cat);
  }
  function filterMenu(){
    const q = document.getElementById('search-input').value;
    if(q){ activeCat='all'; document.querySelectorAll('.cat-tab').forEach(e=>e.classList.remove('active')); document.querySelector('[data-cat="all"]').classList.add('active'); }
    buildMenu(activeCat, q);
  }

  /* ── detail ── */
  function openDetail(idx){
    const item = flatItems[idx]; if(!item) return;
    lastIdx = idx;
    const loc = iL(item), catName = item._cat[lang]||item._cat.en;
    document.getElementById('d-img').src    = item.img;
    document.getElementById('d-img').alt    = loc.name;
    document.getElementById('d-cat').textContent   = catName;
    document.getElementById('d-name').textContent  = loc.name;
    document.getElementById('d-price').textContent = `ETB ${item.price}`;
    document.getElementById('d-desc').textContent  = loc.desc;
    document.getElementById('d-tags').innerHTML = (item.tags||[]).map(tg =>
      `<span class="tag sheet-tag tag-${tg.toLowerCase()}">${tL(tg)}</span>`).join('');
    document.getElementById('d-overlay').classList.add('open');
    document.getElementById('d-sheet').scrollTop = 0;
  }
  function closeDetail(){ document.getElementById('d-overlay').classList.remove('open'); }
  function overlayClick(e){ if(e.target===document.getElementById('d-overlay')) closeDetail(); }

  /* ── nav ── */
  function navigate(page){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    const el = document.getElementById('page-'+page);
    el.classList.add('active'); el.classList.remove('fade-in'); void el.offsetWidth; el.classList.add('fade-in');
    document.getElementById('nav-'+page)?.classList.add('active');
  }

  /* ── translations ── */
  function applyT(){
    const tr = t();
    document.getElementById('nav-home-lbl').textContent    = tr.nav_home;
    document.getElementById('nav-menu-lbl').textContent    = tr.nav_menu;
    document.getElementById('nav-payment-lbl').textContent = tr.nav_payment;
    document.getElementById('nav-about-lbl').textContent   = tr.nav_about;
    document.getElementById('ht').textContent = tr.welcome_title;
    document.getElementById('hs').textContent = tr.welcome_sub;
    document.getElementById('wt').innerHTML   = tr.welcome_text;
    document.getElementById('f1t').textContent = tr.f1t; document.getElementById('f1d').textContent = tr.f1d;
    document.getElementById('f2t').textContent = tr.f2t; document.getElementById('f2d').textContent = tr.f2d;
    document.getElementById('f3t').textContent = tr.f3t; document.getElementById('f3d').textContent = tr.f3d;
    document.getElementById('f4t').textContent = tr.f4t; document.getElementById('f4d').textContent = tr.f4d;
    document.getElementById('cta-m').textContent = tr.cta_m;
    document.getElementById('cta-a').textContent = tr.cta_a;
    document.getElementById('fn').innerHTML = tr.fn;
    document.getElementById('search-input').placeholder = tr.sp;
    document.getElementById('pt').textContent            = tr.pt;
    document.getElementById('ps').textContent            = tr.ps;
    document.getElementById('pay_h').textContent         = tr.pay_h;
    document.getElementById('pay_hs').textContent        = tr.pay_hs;
    document.getElementById('dig').textContent           = tr.dig;
    document.getElementById('tb_s').textContent          = tr.tb_s;
    document.getElementById('rec').textContent           = tr.rec;
    document.getElementById('phn').textContent           = tr.phn;
    document.getElementById('an1').textContent           = tr.an;
    document.getElementById('cbe_s').textContent         = tr.cbe_s;
    document.getElementById('acc').textContent           = tr.acc;
    document.getElementById('an2').textContent           = tr.an;
    document.getElementById('br').textContent            = tr.br;
    document.getElementById('cash-ttl').textContent      = tr.cash;
    document.getElementById('cash-card-ttl').textContent = tr.cash;
    document.getElementById('cash-d').textContent        = tr.cash_d;
    document.getElementById('pn').textContent            = tr.pn;
    document.getElementById('cpl-tb').textContent        = tr.cp;
    document.getElementById('cpl-cbe').textContent       = tr.cp;
    document.getElementById('about-as').textContent = tr.as;
    document.getElementById('about-ab').textContent = tr.ab;
    document.getElementById('s1').textContent = tr.s1; document.getElementById('s2').textContent = tr.s2;
    document.getElementById('s3').textContent = tr.s3; document.getElementById('s4').textContent = tr.s4;
    document.getElementById('fu').textContent = tr.fu;
    document.getElementById('cl').textContent = tr.cl;
    const langLabels = {en:'EN',am:'አማ',om:'OM'};
    document.getElementById('lang-pill-text').textContent = langLabels[lang];
    buildTabs(); buildMenu(activeCat);
    if(document.getElementById('d-overlay').classList.contains('open') && lastIdx>=0) openDetail(lastIdx);
  }

  function setLang(l){
    lang = l;
    document.querySelectorAll('.lang-opt').forEach(o=>o.classList.remove('sel'));
    document.getElementById('lang-'+l).classList.add('sel');
    applyT();
    document.getElementById('lang-ov').classList.remove('open');
  }
  function openLang(){ document.getElementById('lang-ov').classList.add('open'); }
  function closeLang(e){ if(e.target===document.getElementById('lang-ov')) document.getElementById('lang-ov').classList.remove('open'); }

  /* ── theme ── */
  function toggleTheme(){
    isDark = !isDark;
    document.body.classList.toggle('light', !isDark);
    const icon = document.getElementById('theme-icon');
    icon.className = isDark ? 'ti ti-sun' : 'ti ti-moon';
  }

  /* ── INIT ── */
  applyT();
</script>
</body>
</html>
